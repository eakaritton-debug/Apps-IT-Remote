<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Tasks Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- TomSelect (For searchable dropdowns) -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        div:where(.swal2-container) { font-family: 'Prompt', sans-serif !important; }
        .swal2-popup, .swal2-title, .swal2-html-container, .swal2-confirm, .swal2-cancel, .swal2-content { 
            font-family: 'Prompt', sans-serif !important; 
        }
        .swal2-html-container { margin: 0 !important; padding: 0 !important; overflow: hidden; }
        .font-prompt { font-family: 'Prompt', sans-serif !important; }
        
        th { white-space: nowrap; }
        td { white-space: nowrap; text-overflow: ellipsis; overflow: hidden; max-width: 250px; }
        
        .date-toggle-btn { background-color: white; color: #64748b; border: 1px solid #e2e8f0; transition: all 0.2s ease; }
        .date-toggle-btn:hover { background-color: #f8fafc; color: #334155; }
        .date-toggle-btn.active { background-color: #1e293b; color: white; border-color: #1e293b; }

        /* ปรับสีปุ่ม My Tasks เป็นธีมสีแดงสำหรับงาน High */
        .my-task-btn { background-color: white; color: #dc2626; border: 1px solid #fee2e2; transition: all 0.2s ease; }
        .my-task-btn:hover { background-color: #fef2f2; }
        .my-task-btn.active { background-color: #dc2626; color: white; border-color: #dc2626; box-shadow: 0 2px 4px rgba(220, 38, 38, 0.2); }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Tom Select Tailwind Override ธีมสีแดง */
        .ts-wrapper { font-family: 'Prompt', sans-serif !important; }
        .ts-control { 
            border-radius: 0.5rem !important; 
            border: 1px solid #cbd5e1 !important; 
            padding: 0.5rem 0.75rem !important; 
            min-height: 42px !important; 
            background-color: white !important;
            box-shadow: none !important;
            color: #334155 !important;
        }
        .ts-wrapper.focus .ts-control { 
            border-color: #dc2626 !important; 
            box-shadow: 0 0 0 1px #dc2626 !important; 
        }

        /* --- Custom padding เพื่อเว้นระยะไม่ให้ทับ Icon --- */
        .custom-ts-container .ts-control {
            padding-left: 2.75rem !important; 
            background-color: #f8fafc !important;
            border-radius: 0.75rem !important;
            border: 1px solid #e2e8f0 !important; 
            min-height: 46px !important; 
        }
        .custom-ts-container .ts-control .item {
            text-align: left !important;
            margin-left: 0 !important;
        }

        .ts-dropdown { 
            border-radius: 0.5rem !important; 
            border: 1px solid #e2e8f0 !important; 
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1) !important; 
            margin-top: 4px !important; 
        }
        .ts-dropdown .ts-dropdown-content { padding: 4px !important; }
        .ts-dropdown .option { 
            padding: 8px 12px !important; 
            border-radius: 4px !important; 
            cursor: pointer !important; 
            transition: all 0.2s !important; 
            color: #475569 !important;
        }
        .ts-dropdown .option.active, .ts-dropdown .option:hover { 
            background-color: #fef2f2 !important; 
            color: #dc2626 !important; 
            font-weight: 500 !important; 
        }
        .ts-control > input { font-family: 'Prompt', sans-serif !important; font-size: 14px !important; }
        
        .ts-wrapper.disabled .ts-control {
            opacity: 0.4;
            background-color: #f1f5f9 !important;
        }
        
        /* Summary Card Interactive Styles */
        .summary-card { cursor: pointer; transition: all 0.2s ease; }
        .summary-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .summary-card:active { transform: translateY(0); }
        
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
    </style>
</head>
<body class="p-2 md:p-4 text-slate-700 min-h-screen flex flex-col">

    <div class="w-full mx-auto space-y-4 flex-1 flex flex-col">

        <!-- Header Dashboard Section -->
        <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6 bg-white p-5 md:px-6 md:py-5 rounded-2xl shadow-sm border border-slate-100/80">
            <div class="flex items-center gap-4">
                <div class="h-12 w-12 rounded-full bg-red-600 text-white flex items-center justify-center text-xl shadow-md">
                    <i class="fa-solid fa-fire"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-red-700 tracking-tight uppercase flex flex-col sm:flex-row sm:items-baseline gap-1 sm:gap-3">
                        High Tasks Dashboard
                        <span id="last-update-time" class="text-[13px] font-medium text-slate-400 normal-case tracking-normal">วางงานล่าสุด วันที่ -</span>
                    </h1>
                    <p class="text-[12px] text-emerald-500 font-medium flex items-center gap-2 mt-0.5">
                        <span class="relative flex h-2 w-2">
                          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                          <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                        </span>
                        SYSTEM LIVE (Auto-Refresh)
                    </p>
                </div>
            </div>
            
            <!-- Cards -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 w-full xl:w-auto">
                <div id="card-all" onclick="setCardFilter('all')" class="summary-card border-l-[3px] border-slate-700 bg-white border border-slate-100 shadow-sm rounded-r-xl px-5 py-3 ring-2 ring-offset-2 ring-slate-400 scale-[1.02]">
                    <p class="text-[10px] text-slate-500 font-bold mb-1 uppercase tracking-wider">Total Tasks</p>
                    <div class="flex items-end gap-1.5">
                        <span class="text-2xl font-bold text-slate-800 leading-none" id="stat-total">0</span>
                        <span class="text-[10px] text-slate-400 mb-1 font-medium">รายการ</span>
                    </div>
                </div>
                <div id="card-today" onclick="setCardFilter('today')" class="summary-card border-l-[3px] border-amber-400 bg-white border border-slate-100 shadow-sm rounded-r-xl px-5 py-3">
                    <p class="text-[10px] text-amber-500 font-bold mb-1 uppercase tracking-wider">Today</p>
                    <div class="flex items-end gap-1.5">
                        <span class="text-2xl font-bold text-amber-600 leading-none" id="stat-today">0</span>
                        <span class="text-[10px] text-amber-400 mb-1 font-medium">รายการ</span>
                    </div>
                </div>
                <div id="card-other" onclick="setCardFilter('other')" class="summary-card border-l-[3px] border-orange-400 bg-white border border-slate-100 shadow-sm rounded-r-xl px-5 py-3">
                    <p class="text-[10px] text-orange-500 font-bold mb-1 uppercase tracking-wider">Other Days</p>
                    <div class="flex items-end gap-1.5">
                        <span class="text-2xl font-bold text-orange-600 leading-none" id="stat-other">0</span>
                        <span class="text-[10px] text-orange-400 mb-1 font-medium">รายการ</span>
                    </div>
                </div>
                <div id="card-mine" onclick="setCardFilter('mine')" class="summary-card border-l-[3px] border-red-500 bg-red-50/40 border border-red-100/50 shadow-sm rounded-r-xl px-5 py-3">
                    <p class="text-[10px] text-red-500 font-bold mb-1 uppercase tracking-wider">My Tasks</p>
                    <div class="flex items-end gap-1.5">
                        <span class="text-2xl font-bold text-red-600 leading-none" id="stat-mine">0</span>
                        <span class="text-[10px] text-red-400 mb-1 font-medium">รายการ</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-100/80 space-y-4">
            <div class="flex flex-col xl:flex-row gap-4 items-center justify-between">
                
                <div class="flex flex-col md:flex-row gap-4 w-full xl:flex-1">
                    <div class="relative w-full md:flex-1 md:max-w-xl">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </div>
                        <input type="text" id="filter-search" class="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-xl focus:ring-slate-500 focus:border-slate-500 block w-full pl-11 p-3 transition-colors placeholder-slate-400" placeholder="ค้นหา Task No, ชื่อสาขา, จังหวัด, ปัญหา...">
                    </div>

                    <div class="relative w-full md:w-[320px] custom-ts-container">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400 z-10">
                            <i class="fa-solid fa-user-tag"></i>
                        </div>
                        <select id="filter-emp" class="w-full text-sm" placeholder="Search Assignees...">
                            <option value="">All Assignees...</option>
                        </select>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row items-center gap-3 w-full xl:w-auto">
                    
                    <button id="btn-my-tasks" class="my-task-btn px-5 py-2.5 text-sm font-semibold rounded-xl flex items-center gap-2 w-full sm:w-auto justify-center">
                        <i class="fa-solid fa-user-check"></i> My Tasks
                    </button>

                    <div class="flex rounded-xl shadow-sm w-full sm:w-auto" role="group">
                        <button type="button" id="btn-date-all" class="date-toggle-btn active px-5 py-2.5 text-sm font-medium rounded-l-xl border-r-0">
                            All
                        </button>
                        <button type="button" id="btn-date-day" class="date-toggle-btn px-5 py-2.5 text-sm font-medium border-r-0">
                            Day
                        </button>
                        <button type="button" id="btn-date-range" class="date-toggle-btn px-5 py-2.5 text-sm font-medium rounded-r-xl">
                            Range
                        </button>
                    </div>
                </div>

            </div>

            <div id="date-picker-container" class="hidden pt-4 border-t border-slate-100 flex-wrap gap-4 items-center justify-end">
                <div id="single-date-wrap" class="hidden flex items-center gap-3">
                    <span class="text-sm text-slate-500 font-medium">เลือกวันที่:</span>
                    <input type="date" id="input-date-single" class="bg-white border border-slate-200 text-sm rounded-lg px-3 py-2 focus:ring-slate-500 focus:border-slate-500 text-slate-700">
                </div>
                
                <div id="range-date-wrap" class="hidden flex items-center gap-3">
                    <span class="text-sm text-slate-500 font-medium">ตั้งแต่:</span>
                    <input type="date" id="input-date-start" class="bg-white border border-slate-200 text-sm rounded-lg px-3 py-2 focus:ring-slate-500 focus:border-slate-500 text-slate-700">
                    <span class="text-sm text-slate-500 font-medium">ถึง:</span>
                    <input type="date" id="input-date-end" class="bg-white border border-slate-200 text-sm rounded-lg px-3 py-2 focus:ring-slate-500 focus:border-slate-500 text-slate-700">
                </div>
            </div>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100/80 overflow-hidden flex-1 flex flex-col">
            <div class="overflow-x-auto w-full flex-1">
                <table class="w-full text-sm text-left text-slate-600">
                    <thead class="text-[11px] text-slate-400 font-semibold uppercase tracking-wider bg-slate-50/80 border-b border-slate-100">
                        <tr>
                            <th scope="col" class="px-6 py-4">Date</th>
                            <th scope="col" class="px-6 py-4">Task ID</th>
                            <th scope="col" class="px-6 py-4">Branch / Province</th>
                            <th scope="col" class="px-6 py-4 w-[250px] max-w-[300px]">Catalog / Issue</th>
                            <th scope="col" class="px-6 py-4">Status</th>
                            <th scope="col" class="px-6 py-4">Assignee</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-50">
                        <tr>
                            <td colspan="6" class="px-6 py-16 text-center text-slate-400">
                                <i class="fa-solid fa-spinner fa-spin text-3xl mb-4 text-slate-300"></i><br>
                                กำลังโหลดข้อมูล...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="bg-white px-6 py-4 border-t border-slate-100 flex items-center justify-between mt-auto">
                <div class="text-sm text-slate-500 font-medium" id="page-info">
                    Showing 0 to 0 of 0 entries
                </div>
                <div class="flex items-center gap-2">
                    <button id="btn-prev" class="h-9 w-9 rounded-lg flex items-center justify-center border border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-slate-800 hover:border-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition-all">
                        <i class="fa-solid fa-chevron-left text-xs"></i>
                    </button>
                    <div id="page-numbers" class="flex gap-1 text-sm font-medium"></div>
                    <button id="btn-next" class="h-9 w-9 rounded-lg flex items-center justify-center border border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-slate-800 hover:border-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition-all">
                        <i class="fa-solid fa-chevron-right text-xs"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        if (typeof google === 'undefined') {
            window.google = { script: { run: {
                withSuccessHandler: function(fn) { this._s = fn; return this; },
                withFailureHandler: function(fn) { this._f = fn; return this; },
                getHighPageData: function() { setTimeout(() => { this._s({ success: true, data: generateMockData(), currentUserInfo: "12345 - สมชาย ใจดี", lastUpdateTime: "16/04/2026 14:30:00" }); }, 500); },
                getDropdownDataForTasks: function() { setTimeout(() => { this._s({ success: true, data: [{repairType: 'Network', subRepairType: 'Internet Down', forwardStatus: 'Wait Infra', typeAsset: 'Router'}] }); }, 500); },
                saveTeamAction: function(payload) { setTimeout(() => { this._s({ success: true, message: "บันทึกไปที่ Sheet Assigned_Tasks สำเร็จ!" }); }, 800); },
                getAllBranchHistoryMap: function() { 
                    setTimeout(() => { 
                        this._s({ 
                            success: true, 
                            data: {
                                "สาขาสยาม": {
                                    count: 3,
                                    data: [
                                        {date: "10/04/2026 09:30:00", catalog: "Network", detail: "เน็ตหลุดบ่อยมาก บางทีใช้งานไม่ได้เลย", issue: "อินเทอร์เน็ตมีปัญหา", taskNo: "TSK-001"},
                                        {date: "12/04/2026 14:20:00", catalog: "Hardware", detail: "จอฟ้าตอนบูทเครื่อง", issue: "คอมพัง", taskNo: "TSK-002"},
                                        {date: "16/04/2026 15:10:00", catalog: "Server Down", detail: "ระบบล่ม", issue: "ใช้งานไม่ได้", taskNo: "TSK-003"}
                                    ]
                                }
                            } 
                        }); 
                    }, 500); 
                },
                // Mock สำหรับดึงข้อมูลสาขาด้วยรหัส
                getBranchDetailsByCode: function(code) {
                    setTimeout(() => { 
                        if(code === '1111') {
                            this._s({ success: true, data: { name: "สาขาสยามพารากอน", province: "กรุงเทพมหานคร", phone: "02-123-4567" } });
                        } else {
                            this._s({ success: false, message: "ไม่พบรหัสสาขานี้ในระบบ" });
                        }
                    }, 500); 
                }
            }}};
            
            function generateMockData() {
                let mockArray = new Array(19).fill(""); 
                mockArray[18] = "ASSET-10293"; 
                return [
                    { empId: "12345", empName: "สมชาย ใจดี", highLow: "HIGH", taskNo: "TSK-001", createBy: "UserA", branchName: "สาขาสยาม", detail: "ระบบล่มทั้งหมด", workGroup: "IT", catalogSub: "Server Down", issue: "ใช้งานอะไรไม่ได้เลย", reportDate: "15/04/2026", createTime: "10:00", dueDate: "16/04/2026", dueTime: "10:00", province: "กรุงเทพ", phone: "02-111-2222", assignee: "12345 - สมชาย ใจดี", rawData: mockArray },
                    { empId: "12345", empName: "สมชาย ใจดี", highLow: "HIGH", taskNo: "TSK-002", createBy: "UserB", branchName: "-", detail: "ทดสอบสาขาไม่ระบุ", workGroup: "IT", catalogSub: "Network", issue: "ทดสอบการค้นหาสาขา", reportDate: "15/04/2026", createTime: "11:00", dueDate: "16/04/2026", dueTime: "11:00", province: "-", phone: "-", assignee: "12345 - สมชาย ใจดี", rawData: mockArray }
                ];
            }
        }

        let allData = [];
        let filteredData = [];
        let dropdownData = []; 
        let branchHistoryCache = {}; 
        
        let currentUserInfo = "";
        let currentEmpName = "";
        let currentEmpId = "";
        
        let currentPage = 1;
        const itemsPerPage = 10;
        
        let dateMode = 'all'; 
        let cardFilterMode = 'all'; 
        let isMyTasksOnly = false;
        
        let tsFilterEmp; 
        let currentViewingTaskNo = null;
        let clockInterval = null;
        let currentFoundBranch = null; // ตัวแปรเก็บข้อมูลสาขาที่ค้นหาเจอ

        const elTableBody = document.getElementById('table-body');
        const elFilterSearch = document.getElementById('filter-search');
        const btnMyTasks = document.getElementById('btn-my-tasks');
        
        const btnDateAll = document.getElementById('btn-date-all');
        const btnDateDay = document.getElementById('btn-date-day');
        const btnDateRange = document.getElementById('btn-date-range');
        
        const datePickerContainer = document.getElementById('date-picker-container');
        const singleDateWrap = document.getElementById('single-date-wrap');
        const rangeDateWrap = document.getElementById('range-date-wrap');
        
        const inputDateSingle = document.getElementById('input-date-single');
        const inputDateStart = document.getElementById('input-date-start');
        const inputDateEnd = document.getElementById('input-date-end');
        
        const statTotal = document.getElementById('stat-total');
        const statToday = document.getElementById('stat-today');
        const statOther = document.getElementById('stat-other');
        const statMine = document.getElementById('stat-mine');
        
        const pageInfo = document.getElementById('page-info');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        document.addEventListener('DOMContentLoaded', () => {
            tsFilterEmp = new TomSelect("#filter-emp", {
                create: false,
                sortField: { field: "text", direction: "asc" },
                placeholder: "Search Assignees...",
                onChange: function(value) {
                    applyFilters();
                }
            });

            fetchData();
            fetchDropdownData();
            fetchAllBranchHistory(); 
            
            setInterval(fetchDataSilent, 30000);
        });

        function showToast(message, type = 'warning') {
            const toast = document.createElement('div');
            toast.className = `fixed top-5 right-5 z-[9999] px-6 py-3 rounded-xl shadow-lg border transform transition-all duration-300 translate-x-[120%] opacity-0 flex items-center gap-3 ${type === 'warning' ? 'bg-amber-50 border-amber-200 text-amber-800' : 'bg-rose-50 border-rose-200 text-rose-800'}`;
            toast.innerHTML = `
                <i class="fa-solid ${type === 'warning' ? 'fa-triangle-exclamation text-amber-500' : 'fa-circle-xmark text-rose-500'} text-xl"></i>
                <div class="font-prompt font-medium text-sm">${message}</div>
            `;
            document.body.appendChild(toast);
            
            toast.offsetHeight;
            toast.classList.remove('translate-x-[120%]', 'opacity-0');

            setTimeout(() => {
                toast.classList.add('translate-x-[120%]', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ==========================================
        // Data Fetching
        // ==========================================
        function fetchAllBranchHistory() {
            google.script.run
                .withSuccessHandler((res) => {
                    if (res.success) {
                        branchHistoryCache = res.data;
                        
                        if (currentViewingTaskNo) {
                            const task = allData.find(t => t.taskNo === currentViewingTaskNo);
                            if (task) {
                                const branchNameStr = currentFoundBranch ? currentFoundBranch.name : String(task.branchName).trim();
                                const branchHistory = branchHistoryCache[branchNameStr] || { count: 0, data: [] };
                                
                                const countEl = document.getElementById('history-count');
                                if (countEl) countEl.innerText = branchHistory.count;
                                
                                const btnToggle = document.getElementById('btn-toggle-history');
                                if (btnToggle) btnToggle.disabled = (branchHistory.count === 0);
                                
                                const btnFilter = document.getElementById('btn-filter-catalog');
                                let filterCatalog = null;
                                if (btnFilter && btnFilter.classList.contains('filtered')) {
                                    filterCatalog = task.catalogSub;
                                }
                                
                                window.renderHistoryItems(branchNameStr, filterCatalog);
                            }
                        }
                    }
                })
                .getAllBranchHistoryMap();
        }

        function fetchData() {
            google.script.run
                .withSuccessHandler((res) => {
                    if (res.success) {
                        allData = Array.isArray(res.data) ? res.data : []; 
                        currentUserInfo = res.currentUserInfo || "";
                        parseUserInfo();
                        
                        if (res.lastUpdateTime && res.lastUpdateTime !== "-") {
                            document.getElementById('last-update-time').innerHTML = `<i class="fa-regular fa-clock mr-1 text-slate-300"></i> วางงานล่าสุด วันที่ ${res.lastUpdateTime}`;
                        }
                        
                        applyFilters();
                    } else {
                        Swal.fire('ข้อผิดพลาด', res.message, 'error');
                        elTableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-6 text-center text-red-500">${res.message}</td></tr>`;
                    }
                })
                .withFailureHandler((err) => {
                    Swal.fire('ข้อผิดพลาดระบบ', err.message, 'error');
                })
                .getHighPageData();
        }

        function fetchDataSilent() {
            google.script.run
                .withSuccessHandler((res) => {
                    if (res.success) {

        function parseUserInfo() {
            if(currentUserInfo.includes(' - ')) {
                currentEmpId = currentUserInfo.split(' - ')[0].trim();
                currentEmpName = currentUserInfo.split(' - ')[1].trim();
            } else {
                currentEmpId = "";
                currentEmpName = currentUserInfo.trim();
            }
        }

        function parseDate(dateStr) {
            if(!dateStr) return null;
            if(dateStr.includes('/')) {
                let p = dateStr.split('/');
                if(p.length === 3) return new Date(p[2], p[1]-1, p[0]).setHours(0,0,0,0);
            }
            let d = new Date(dateStr);
            if(!isNaN(d.getTime())) return d.setHours(0,0,0,0);
            return null;
        }

        function parseDateTimeStr(dtStr) {
            if(!dtStr) return 0;
            const parts = dtStr.trim().split(' ');
            if(parts.length < 2) return 0;
            const dParts = parts[0].split('/');
            const tParts = parts[1].split(':');
            if(dParts.length === 3) {
                return new Date(dParts[2], dParts[1]-1, dParts[0], tParts[0]||0, tParts[1]||0, tParts[2]||0).getTime();
            }
            return 0;
        }

        // ==========================================
        // Filters & Table Render
        // ==========================================
        function setCardFilter(mode) {
            cardFilterMode = mode;
            document.querySelectorAll('.summary-card').forEach(c => c.classList.remove('ring-2', 'ring-offset-2', 'scale-[1.02]', 'ring-slate-400', 'ring-amber-400', 'ring-orange-400', 'ring-red-400'));
            
            let colorClass = '';
            if(mode === 'all') colorClass = 'ring-slate-400';
            if(mode === 'today') colorClass = 'ring-amber-400';
            if(mode === 'other') colorClass = 'ring-orange-400';
            if(mode === 'mine') colorClass = 'ring-red-400';

            const cardObj = document.getElementById(`card-${mode}`);
            if(cardObj) cardObj.classList.add('ring-2', 'ring-offset-2', 'scale-[1.02]', colorClass);
            
            applyFilters();
        }

        function applyFilters(isSilent = false) {
            if (!Array.isArray(allData)) allData = []; 
            
            const search = elFilterSearch.value.toLowerCase();
            const selectedEmp = tsFilterEmp.getValue();
            
            const singleTime = inputDateSingle.value ? new Date(inputDateSingle.value).setHours(0,0,0,0) : null;
            const startTime = inputDateStart.value ? new Date(inputDateStart.value).setHours(0,0,0,0) : null;
            const endTime = inputDateEnd.value ? new Date(inputDateEnd.value).setHours(23,59,59,999) : null;

            const normName = currentEmpName ? currentEmpName.replace(/\s+/g, '').toLowerCase() : '';
            const normId = currentEmpId ? currentEmpId.toLowerCase() : '';

            let preEmpFilterData = allData.filter(row => {
                let actualName = row.empName || ''; 
                let assignee = row.assignee || '';
                
                let targetText = `${actualName} ${assignee}`.replace(/\s+/g, '').toLowerCase();
                let isMyTask = false;
                if (normName && targetText.includes(normName)) isMyTask = true;
                if (normId && targetText.includes(normId)) isMyTask = true;

                if (isMyTasksOnly && !isMyTask) return false;

                if (search) {
                    const provinceVal = row.province || (row.rawData && row.rawData[14]) || '';
                    const combinedText = `${row.taskNo} ${row.branchName} ${provinceVal} ${row.catalogSub} ${row.issue} ${actualName} ${assignee}`.toLowerCase();
                    if (!combinedText.includes(search)) return false;
                }

                if (dateMode !== 'all') {
                    const rTime = parseDate(row.reportDate);
                    if(!rTime) return false; 
                    if (dateMode === 'day' && singleTime) { if (rTime !== singleTime) return false; }
                    else if (dateMode === 'range') {
                        if (startTime && rTime < startTime) return false;
                        if (endTime && rTime > endTime) return false;
                    }
                }
                return true;
            });

            const empMap = new Map();
            let unassignedCount = 0;
            preEmpFilterData.forEach(row => {
                let actualName = row.empName || '';
                if(actualName && actualName !== '-') {
                    if(!empMap.has(actualName)) empMap.set(actualName, { name: actualName, count: 0 });
                    empMap.get(actualName).count++;
                } else {
                    unassignedCount++;
                }
            });

            tsFilterEmp.clearOptions();
            tsFilterEmp.addOption({value: '', text: 'All Assignees...'});
            const sortedEmps = Array.from(empMap.values()).sort((a, b) => a.name.localeCompare(b.name));
            sortedEmps.forEach(e => {
                tsFilterEmp.addOption({value: e.name, text: `${e.name} (${e.count})`});
            });
            if (unassignedCount > 0) {
                tsFilterEmp.addOption({value: 'Unassigned', text: `ไม่ระบุชื่อ/ไม่มีผู้รับผิดชอบ (${unassignedCount})`});
            }
            if(selectedEmp) tsFilterEmp.setValue(selectedEmp, true); 

            let baseFilteredData = preEmpFilterData.filter(row => {
                let actualName = row.empName || '';
                if (selectedEmp) {
                    if (selectedEmp === 'Unassigned') {
                        if (actualName && actualName !== '-') return false;
                    } else {
                        if (actualName !== selectedEmp) return false;
                    }
                }
                return true;
            });

            const todayTimestamp = new Date().setHours(0,0,0,0);
            let tCount = 0, oCount = 0, mCount = 0;

            baseFilteredData.forEach(row => {
                const rTime = parseDate(row.reportDate);
                if (rTime === todayTimestamp) { tCount++; } else { oCount++; }
                
                let actualName = row.empName || ''; 
                let assignee = row.assignee || '';
                let targetText = `${actualName} ${assignee}`.replace(/\s+/g, '').toLowerCase();
                let isMyTask = false;
                
                if (normName && targetText.includes(normName)) isMyTask = true;
                if (normId && targetText.includes(normId)) isMyTask = true;
                
                if (isMyTask) { mCount++; }
            });

            statTotal.textContent = baseFilteredData.length;
            statToday.textContent = tCount;
            statOther.textContent = oCount;
            statMine.textContent = mCount;

            filteredData = baseFilteredData.filter(row => {
                const rTime = parseDate(row.reportDate);
                let actualName = row.empName || ''; 
                let assignee = row.assignee || '';
                
                let targetText = `${actualName} ${assignee}`.replace(/\s+/g, '').toLowerCase();
                let isMyTask = false;
                if (normName && targetText.includes(normName)) isMyTask = true;
                if (normId && targetText.includes(normId)) isMyTask = true;

                if (cardFilterMode === 'today' && rTime !== todayTimestamp) return false;
                if (cardFilterMode === 'other' && rTime === todayTimestamp) return false;
                if (cardFilterMode === 'mine' && !isMyTask) return false;
                
                return true;
            });

            if(!isSilent) currentPage = 1;
            renderTable();
        }

                            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-pink-50 border border-pink-100 text-red-600 font-bold text-[13px] shadow-sm">

        function getLiveTime() {
            const now = new Date();
            const d = String(now.getDate()).padStart(2,'0');
            const m = String(now.getMonth() + 1).padStart(2,'0');
            const y = now.getFullYear() + 543; 
            const hr = String(now.getHours()).padStart(2,'0');
            const min = String(now.getMinutes()).padStart(2,'0');
            const sec = String(now.getSeconds()).padStart(2,'0');
            return `${d}/${m}/${y} ${hr}:${min}:${sec}`;
        }

        function updateLeftPanelLive(task) {
            if(!task) return;
            // ถ้ากำลังแสดงข้อมูลที่ค้นหาเจอใหม่ ให้ข้ามการอัปเดตแบบ Live บางส่วน

            const setHtml = (id, val) => { const el = document.getElementById(id); if(el) el.innerHTML = val; };
            
            setHtml('live-highlow', task.highLow || '-');
            const hL = document.getElementById('live-highlow');
            if (hL) hL.className = `text-[14px] font-bold ${task.highLow === 'HIGH' ? 'text-rose-600' : 'text-emerald-600'}`;

            setHtml('live-created', `${task.reportDate || '-'} <span class="text-[11px] font-normal text-slate-500">${task.createTime || ''}</span>`);
            const prov = task.province || (task.rawData && task.rawData[14]) || '-';
            setHtml('live-branch', `${task.branchName || '-'} <span class="text-slate-500 font-normal text-xs ml-1">(${prov})</span>`);
            setHtml('live-phone', task.phone || '-');
            setHtml('live-catalog', task.catalogSub || '-');
            setHtml('live-issue', task.issue || '-');
            setHtml('live-detail', task.detail || '-');
            setHtml('live-due', `${task.dueDate || '-'} <span class="text-slate-500 font-normal ml-1">${task.dueTime || ''}</span>`);
        }

        function initFormLogic() {
            const tsConfig = { create: false, sortField: { field: "text", direction: "asc" } };
            
            const tsRepairType = new TomSelect("#form-repair-type", tsConfig);
            const tsSubRepair = new TomSelect("#form-sub-repair", tsConfig);
            const tsAssetType = new TomSelect("#form-asset-type", tsConfig);
            const tsTeamStatus = new TomSelect("#form-team-status", tsConfig);
            const tsActionResult = new TomSelect("#form-action-result", tsConfig);
            const tsForwardTeam = new TomSelect("#form-forward-team", tsConfig);

            const fwdStatus = document.getElementById('form-forward-status');
            const lblResolution = document.getElementById('lbl-resolution');
            const fwdContainer = document.getElementById('forward-container');

            tsRepairType.on('change', (val) => {
                tsSubRepair.clear();
                tsSubRepair.clearOptions();
                fwdStatus.value = '';
                document.getElementById('form-sub-repair-other').classList.add('hidden');
                document.getElementById('form-sub-repair-other').value = '';

                if (val) {
                    const subs = new Set();
                    dropdownData.filter(d => d.repairType === val).forEach(d => {
                        if (d.subRepairType) subs.add(d.subRepairType);
                    });
                    Array.from(subs).forEach(s => tsSubRepair.addOption({value: s, text: s}));
                    tsSubRepair.addOption({value: 'อื่นๆ', text: 'อื่นๆ'});
                }
            });

            tsSubRepair.on('change', (srtVal) => {
                const rtVal = tsRepairType.getValue();
                const otherInput = document.getElementById('form-sub-repair-other');
                
                if (srtVal === 'อื่นๆ') {
                    otherInput.classList.remove('hidden');
                    fwdStatus.value = '';
                } else {
                    otherInput.classList.add('hidden');
                    otherInput.value = '';
                    const match = dropdownData.find(d => d.repairType === rtVal && d.subRepairType === srtVal);
                    fwdStatus.value = (match && match.forwardStatus) ? match.forwardStatus : '';
                }
            });

            tsTeamStatus.on('change', (val) => {
                tsActionResult.enable();
                tsActionResult.clear();
                tsActionResult.clearOptions();
                tsForwardTeam.clear();

                if (val === 'ทีมรีโมทจบงาน-ได้') {
                    lblResolution.innerHTML = 'การแก้ไข <span class="text-rose-500">*</span>';
                    tsActionResult.addOption({value: 'ยกเลิกงาน', text: 'ยกเลิกงาน'});
                    tsActionResult.addOption({value: 'แก้ไขเรียบร้อย', text: 'แก้ไขเรียบร้อย'});
                    fwdContainer.classList.add('hidden');
                } else if (val === 'ทีมรีโมทจบงาน-ไม่ได้') {
                    lblResolution.innerHTML = 'การแก้ไขเบื้องต้น <span class="text-rose-500">*</span>';
                    tsActionResult.addOption({value: 'ส่งต่อ', text: 'ส่งต่อ'});
                    tsActionResult.setValue('ส่งต่อ');
                    fwdContainer.classList.remove('hidden');
                } else {
                    tsActionResult.disable();
                    fwdContainer.classList.add('hidden');
                }
            });
        }

        function handleSaveTaskAction(taskNo) {
            let finalSubRepair = document.getElementById('form-sub-repair').tomselect.getValue();
            const subRepairOther = document.getElementById('form-sub-repair-other').value.trim();
            if (finalSubRepair === 'อื่นๆ' && subRepairOther) {
                finalSubRepair = 'อื่นๆ - ' + subRepairOther;
            }

            const task = allData.find(t => t.taskNo === taskNo);
            
            // เช็คว่าเดิมทีต้องบังคับกรอกรหัสสาขาไหม
            const needsBranchCode = (String(task.branchName).trim() === '-');
            let finalBranchName = task?.branchName || '';
            let finalProvince = task?.province || (task?.rawData && task.rawData[14]) || '';
            let finalPhone = task?.phone || '';

            // ถ้าต้องบังคับกรอก แล้วค้นหาเจอ ให้ใช้ข้อมูลที่ค้นหาเจอแทน
            if (needsBranchCode) {
                if (!currentFoundBranch) {
                    showToast('กรุณาป้อนรหัสสาขาและกดค้นหาให้พบข้อมูลก่อนบันทึก', 'warning');
                    return;
                }
                finalBranchName = currentFoundBranch.name;
                finalProvince = currentFoundBranch.province;
                finalPhone = currentFoundBranch.phone;
            }

            const payload = {
                highLow: task?.highLow || '',
                createBy: task?.createBy || '',
                
                // ใช้ข้อมูลสาขาที่อัปเดตแล้ว (ถ้ามี)
                branchName: finalBranchName,
                province: finalProvince,
                phone: finalPhone,
                
                catalogSub: task?.catalogSub || '',
                detail: task?.detail || '',
                issue: task?.issue || '',
                reportDate: task?.reportDate || '',
                createTime: task?.createTime || '',
                dueDate: task?.dueDate || '',
                dueTime: task?.dueTime || '',
                openDate: task?.openDate || '',

                taskNo: taskNo,
                user: document.getElementById('form-user').value,
                branchContact: document.getElementById('form-branch-contact').value.trim(),
                actionTime: document.getElementById('form-time').value,
                repairType: document.getElementById('form-repair-type').tomselect.getValue(),
                subRepairType: finalSubRepair,
                assetType: document.getElementById('form-asset-type').tomselect.getValue(),
                assetId: document.getElementById('form-asset-id').value.trim(), 
                symptom: document.getElementById('form-symptom').value,
                teamStatus: document.getElementById('form-team-status').tomselect.getValue(),
                actionResult: document.getElementById('form-action-result').tomselect.getValue(),
                resolution: document.getElementById('form-resolution').value,
                forwardTeam: document.getElementById('form-forward-team').tomselect.getValue(),
                forwardStatus: document.getElementById('form-forward-status').value,
                remark: document.getElementById('form-remark').value,
                rawData: task?.rawData 
            };

            if (!payload.branchContact) {
                showToast('กรุณาระบุ ผู้รับเรื่องสาขา', 'warning'); return;
            }
            if (!payload.repairType || !payload.subRepairType || !payload.symptom || !payload.teamStatus || !payload.resolution) {
                showToast('กรุณากรอกข้อมูลในช่องที่มีเครื่องหมายดอกจัน (*) ให้ครบ', 'warning'); return;
            }
            if (document.getElementById('form-sub-repair').tomselect.getValue() === 'อื่นๆ' && !subRepairOther) {
                showToast('กรุณาระบุรายละเอียด ประเภทงานย่อย (อื่นๆ)', 'warning'); return;
            }
            if (payload.teamStatus === 'ทีมรีโมทจบงาน-ไม่ได้' && !payload.forwardTeam) {
                showToast('กรุณาเลือกทีมที่ต้องการส่งต่องาน', 'warning'); return;
            }
            if (payload.teamStatus === 'ทีมรีโมทจบงาน-ได้' && !payload.actionResult) {
                showToast('กรุณาเลือก ยกเลิกงาน หรือ แก้ไขเรียบร้อย', 'warning'); return;
            }

            const confirmDetails = document.getElementById('confirm-details');
            confirmDetails.innerHTML = `
                <div class="flex justify-between py-1 border-b border-slate-100"><span class="font-bold">Task No:</span> <span class="text-red-600 font-bold">${payload.taskNo}</span></div>
                <div class="flex justify-between py-1 border-b border-slate-100"><span class="font-bold">ประเภทงาน:</span> <span>${payload.repairType}</span></div>
                <div class="flex justify-between py-1 border-b border-slate-100"><span class="font-bold">สถานะทีม:</span> <span class="${payload.teamStatus.includes('ได้') && !payload.teamStatus.includes('ไม่ได้') ? 'text-emerald-600' : 'text-rose-500'} font-bold">${payload.teamStatus}</span></div>
                <div class="flex justify-between py-1 border-b border-slate-100"><span class="font-bold">ผลดำเนินการ:</span> <span>${payload.actionResult}</span></div>
                ${payload.forwardTeam ? `<div class="flex justify-between py-1 border-b border-slate-100"><span class="font-bold">ส่งต่อไปยัง:</span> <span class="text-rose-500 font-bold">${payload.forwardTeam}</span></div>` : ''}
            `;

            const overlay = document.getElementById('confirm-overlay');
            const box = document.getElementById('confirm-box');
            overlay.classList.remove('hidden');
            setTimeout(() => { box.classList.remove('scale-95', 'opacity-0'); }, 10);

            document.getElementById('btn-confirm-cancel').onclick = () => {
                box.classList.add('scale-95', 'opacity-0');
                setTimeout(() => { overlay.classList.add('hidden'); }, 200);
            };

            document.getElementById('btn-confirm-save').onclick = () => {
                box.classList.add('scale-95', 'opacity-0');
                setTimeout(() => { overlay.classList.add('hidden'); executeUploadAction(payload); }, 200);
            };
        }

        function executeUploadAction(payload) {
            const progressOverlay = document.getElementById('progress-overlay');
            progressOverlay.classList.remove('hidden'); progressOverlay.classList.add('flex');
            
            const bar = document.getElementById('upload-progress-bar');
            const pct = document.getElementById('upload-percent');
            let progress = 0;
            
            const timer = setInterval(() => {
                progress += 15;
                if (progress >= 95) progress = 95;
                if (bar) bar.style.width = progress + '%';
                if (pct) pct.innerText = progress + '%';
            }, 100);

            google.script.run
                .withSuccessHandler((res) => {
                    clearInterval(timer);
                    if (bar) bar.style.width = '100%';
                    if (pct) pct.innerText = '100%';
                    
                    setTimeout(() => {
                        if (res.success) {
                            Swal.fire({
                                icon: 'success', title: 'บันทึกสำเร็จ!', html: res.message, confirmButtonText: 'ตกลง',
                                customClass: { popup: '!rounded-2xl font-prompt', confirmButton: 'bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2.5 px-6 rounded-lg' }
                            }).then(() => fetchDataSilent());
                        } else {
                            progressOverlay.classList.add('hidden'); progressOverlay.classList.remove('flex');
                            Swal.fire('ข้อผิดพลาด', res.message, 'error');
                        }
                    }, 200); 
                })
                .withFailureHandler((err) => {
                    clearInterval(timer);
                    progressOverlay.classList.add('hidden'); progressOverlay.classList.remove('flex');
                    Swal.fire('ข้อผิดพลาดระบบ', err.message, 'error');
                })
                .saveTeamAction(payload);
        }

        btnPrev.addEventListener('click', () => { if(currentPage > 1) { currentPage--; renderTable(); }});
        btnNext.addEventListener('click', () => { currentPage++; renderTable(); });

        elFilterSearch.addEventListener('input', () => applyFilters());

        btnMyTasks.addEventListener('click', () => {
            isMyTasksOnly = !isMyTasksOnly;
            if(isMyTasksOnly) {
                btnMyTasks.classList.add('active');
                tsFilterEmp.clear(true);
                tsFilterEmp.disable();
            } else {
                btnMyTasks.classList.remove('active');
                tsFilterEmp.enable();
            }
            applyFilters();
        });

        function setDateMode(mode) {
            dateMode = mode;
            [btnDateAll, btnDateDay, btnDateRange].forEach(btn => btn.classList.remove('active'));
            datePickerContainer.classList.add('hidden');
            singleDateWrap.classList.add('hidden');
            rangeDateWrap.classList.add('hidden');

            if(mode === 'all') {
                btnDateAll.classList.add('active');
            } else {
                datePickerContainer.classList.remove('hidden');
                datePickerContainer.classList.add('flex');
                if (mode === 'day') {
                    btnDateDay.classList.add('active');
                    singleDateWrap.classList.remove('hidden');
                } else if (mode === 'range') {
                    btnDateRange.classList.add('active');
                    rangeDateWrap.classList.remove('hidden');
                }
            }
            applyFilters();
        }

        btnDateAll.addEventListener('click', () => setDateMode('all'));
        btnDateDay.addEventListener('click', () => setDateMode('day'));
        btnDateRange.addEventListener('click', () => setDateMode('range'));

        inputDateSingle.addEventListener('change', () => applyFilters());
        inputDateStart.addEventListener('change', () => applyFilters());
        inputDateEnd.addEventListener('change', () => applyFilters());

    </script>
</body>
</html>
