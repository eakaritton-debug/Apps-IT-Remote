<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Service </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f3f4f6;
        }
        
        /* Custom Scrollbar */
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        /* Sidebar Styling & Animation Classes */
        #mainSidebar {
            background: linear-gradient(180deg, #143d28 0%, #0f2e1e 100%);
            color: #d1fae5;
            width: 18rem; /* 288px */
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 40; /* ให้อยู่เหนือ MainContent เสมอ */
        }
        
        /* เพิ่ม Animation ให้ส่วนหัวเลื่อนอย่างสมูท */
        #headerLeftContent {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Default Mobile (Hidden) */
        @media (max-width: 767px) {
            #mainSidebar { transform: translateX(-100%); width: 18rem; }
            #mainContent { margin-left: 0; }
            body.mobile-sidebar-open #mainSidebar { transform: translateX(0); }
            body.mobile-sidebar-open #mobileMenuOverlay { display: block; }
        }

        #sidebarToggleBtn { display: none; } /* ซ่อนปุ่มเปิดปิด sidebar บนมือถือ (ใช้ overlay แทน) */

        /* Desktop States */
        @media (min-width: 768px) {
            #sidebarToggleBtn { display: flex; }
            
            /* --- ระบบ Overlay (แก้ Iframe แล็ก และแก้หน้าเด้งลง) --- */
            /* ล็อคขนาด MainContent ให้เท่ากับตอนพับเสมอ Iframe จะได้ไม่ต้องย่อ/ขยาย */
            #mainContent {
                margin-left: 5rem !important; 
            }

            /* เมื่อเปิด (โหมดปกติ) - Sidebar จะกว้างออกและ "ลอยทับ" เนื้อหาบางส่วน */
            body.desktop-sidebar-open #mainSidebar { width: 18rem; transform: translateX(0); }
            body.desktop-sidebar-open #sidebarToggleIcon { transform: rotate(0deg); }
            
            /* ใช้ transform เลื่อนกลุ่มข้อความ Header หลบ Sidebar แทนการใช้ padding เพื่อป้องกันหน้ากระตุก/ดันลง */
            body.desktop-sidebar-open #headerLeftContent { transform: translateX(13.5rem); }

            /* เมื่อพับเก็บ (โหมด Mini Sidebar) - กลับมาขนาดปกติ */
            body.desktop-sidebar-closed #mainSidebar { width: 5rem; transform: translateX(0); }
            body.desktop-sidebar-closed #sidebarToggleIcon { transform: rotate(180deg); }
            
            /* Header กลับมาตำแหน่งเดิม */
            body.desktop-sidebar-closed #headerLeftContent { transform: translateX(0); }
            
            /* --- ซ่อน/แสดง องค์ประกอบเมื่อพับเก็บ --- */
            body.desktop-sidebar-closed .sidebar-text,
            body.desktop-sidebar-closed .sidebar-header-text,
            body.desktop-sidebar-closed .sidebar-profile-info,
            body.desktop-sidebar-closed .sidebar-cog-icon,
            body.desktop-sidebar-closed .fa-chevron-down {
                display: none !important;
            }
            
            /* แสดงไอคอนพิเศษตอนพับ (โลโก้ร้านแบบย่อ) */
            body.desktop-sidebar-closed .sidebar-header-icon {
                display: block !important;
            }

            /* จัดกึ่งกลางไอคอนเมนู */
            body.desktop-sidebar-closed .sidebar-link,
            body.desktop-sidebar-closed .nav-group-toggle,
            body.desktop-sidebar-closed #sidebarLogoutBtn {
                justify-content: center;
                padding-left: 0;
                padding-right: 0;
                width: 3rem; /* ทำเป็นทรงสี่เหลี่ยมจัตุรัส */
                height: 3rem;
                margin: 0.25rem auto;
            }
            body.desktop-sidebar-closed .sidebar-link i,
            body.desktop-sidebar-closed .nav-group-toggle i,
            body.desktop-sidebar-closed #sidebarLogoutBtn i,
            body.desktop-sidebar-closed .dot-icon {
                margin-right: 0 !important;
                font-size: 1.25rem;
            }
            
            /* ปรับรูปแบบปุ่ม Active เมื่อพับเก็บ */
            body.desktop-sidebar-closed .sidebar-link.active {
                border-left-width: 0;
                border-radius: 0.5rem;
                margin-left: auto;
                margin-right: auto;
                justify-content: center;
            }

            /* --- อัพเดตแก้ไข: ปรับ Profile Card เมื่อพับ ให้เป็นวงกลมเต็มๆ --- */
            body.desktop-sidebar-closed .profile-card-container {
                width: 3.5rem !important;
                height: 3.5rem !important;
                padding: 0 !important;
                border-radius: 50% !important; /* บังคับเป็นวงกลม */
                justify-content: center;
                align-items: center;
                margin: 0 auto;
                background-color: transparent;
                border: 2px solid transparent;
            }
            body.desktop-sidebar-closed .profile-card-container:hover {
                background-color: rgba(255,255,255,0.05);
            }
            body.desktop-sidebar-closed .profile-flex {
                justify-content: center;
                width: 100%;
            }
            body.desktop-sidebar-closed .profile-pic-wrapper {
                margin: 0 !important;
                width: 2.5rem;
                height: 2.5rem;
            }
            body.desktop-sidebar-closed #sidebarProfilePic {
                width: 2.5rem;
                height: 2.5rem;
            }
            
            /* ปรับ Submenu ให้อยู่กึ่งกลาง */
            body.desktop-sidebar-closed .nav-group-inner {
                justify-content: center;
                width: 100%;
            }
            
            /* ปรับเส้นกั้น */
            body.desktop-sidebar-closed .sidebar-divider {
                margin-left: 1rem;
                margin-right: 1rem;
            }
        }

        .sidebar-link {
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
            color: rgba(255,255,255,0.7);
        }
        
        .sidebar-link:hover {
            color: white;
            background-color: rgba(255,255,255,0.05);
            padding-left: 1.25rem;
        }

        .sidebar-link.active {
            background-color: rgba(255,255,255,0.1);
            color: white;
            border-left-color: #34d399;
            font-weight: 500;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-radius: 0 0.5rem 0.5rem 0;
            margin-right: 0.5rem;
        }
        
        .sidebar-link.active i { color: #34d399; }
        
        /* ตั้งค่ารูปภาพโปรไฟล์พื้นฐาน */
        #sidebarProfilePic {
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        /* Welcome Shortcut Grid */
        .shortcut-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .shortcut-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* Toast Notifications */
        #toastContainer {
            position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
            display: flex; flex-direction: column; gap: 0.75rem; pointer-events: none;
        }
        
        .toast-item {
            pointer-events: auto; transform: translateX(100%);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); opacity: 0;
        }
        
        .toast-item.show { transform: translateX(0); opacity: 1; }

        /* Access Denied Box */
        #accessDeniedBox {
            position: fixed; top: 20px; right: 20px; 
            background-color: #fee2e2; color: #991b1b;
            padding: 1rem; border-radius: 0.5rem; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            z-index: 1000; display: none; max-width: 320px; 
            border-left: 4px solid #dc2626;
            animation: slideInRight 0.3s ease-out;
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Utilities */
        #mobileMenuOverlay { backdrop-filter: blur(2px); display: none; }
        .spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Preloaded Iframe Layers */
        .iframe-layer {
            transition: opacity 0.2s ease-in-out;
        }

    </style>
</head>

        'DASHBOARD_02': 'Dashboard_02',
        'VOUCHERUSAGE': 'VoucherUsage',
        'USERPROFILE': 'UserProfile',
        'ACCOUNTING': 'Accounting',
        'CHECKINSENIOR': 'Checkinsenior',
        'IMPORTF1': 'ImportF1',
        'HIGH': 'High',
        'LOW': 'Low',
        'WORK': 'Work',
        'CHECKBRANCH': 'CheckBranch',
        'ASSIGNEDTASKS': 'AssignedTasks',
        'USERMANAGEMENT': 'UserManagement'
    };

    const QUICK_ACTIONS = {
        'SALE': { icon: 'fa-cash-register', title: 'New Sale', desc: 'Create a new voucher order', color: 'bg-green-50 text-green-600', hover: 'hover:border-green-500' },
        'REPORTS': { icon: 'fa-history', title: 'Sales History', desc: 'View past transactions', color: 'bg-blue-50 text-blue-600', hover: 'hover:border-blue-500' },
        'DASHBOARD_02': { icon: 'fa-chart-pie', title: 'Analytics', desc: 'View performance stats', color: 'bg-purple-50 text-purple-600', hover: 'hover:border-purple-500' },
        'VOUCHERUSAGE': { icon: 'fa-ticket-alt', title: 'Redeem Voucher', desc: 'Process voucher usage', color: 'bg-orange-50 text-orange-600', hover: 'hover:border-orange-500' }
    };

    // --- Preloading System Variables ---
    const preloadedFrames = {};
    let pagesToPreload = [];

    // --- Initialization ---
    document.addEventListener('DOMContentLoaded', () => {
        setupDateDisplay();
        setupEventListeners();
        
        // Load User Data & Init
        if (isApiReady()) {
            google.script.run.withSuccessHandler(onUserLoaded).withFailureHandler(onLoadFail).getUserProfile();
        } else {
            onLoadFail(); // Fallback for local testing
        }
    });

    function setupEventListeners() {
        el.sidebarToggleBtn?.addEventListener('click', toggleDesktopSidebar);
        el.mobileBtn?.addEventListener('click', toggleMobileMenu);
        el.mobileOverlay?.addEventListener('click', toggleMobileMenu);
        
        document.getElementById('closeDeniedBox')?.addEventListener('click', hideAccessDenied);
        if (el.profilePic) el.profilePic.onerror = () => { el.profilePic.src = CONFIG.errorPic; };
        el.logoutBtn?.addEventListener('click', (e) => { e.preventDefault(); handleLogout(); });
        
        // Nav Group Toggle
        document.querySelectorAll('.nav-group-toggle').forEach(toggle => {
            toggle.addEventListener('click', () => {
                const group = toggle.parentElement;
                const items = group.querySelector('.nav-group-items');
                const icon = toggle.querySelector('.fa-chevron-down');
                
                items.classList.toggle('hidden');
                
                if(icon) {
                    icon.style.transform = items.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
                }
            });
        });
    }

    function toggleDesktopSidebar() {
        const body = document.body;
        if (body.classList.contains('desktop-sidebar-open')) {
            body.classList.remove('desktop-sidebar-open');
            body.classList.add('desktop-sidebar-closed');
        } else {
            body.classList.remove('desktop-sidebar-closed');
            body.classList.add('desktop-sidebar-open');
        }
    }

    function toggleMobileMenu() {
        const body = document.body;
        if (body.classList.contains('mobile-sidebar-open')) {
            body.classList.remove('mobile-sidebar-open');
        } else {
            body.classList.add('mobile-sidebar-open');
        }
    }

    function onUserLoaded(response) {
        if (response.success && response.data) {
            state.employeeName = response.data.employeeName || CONFIG.currentUser;
        }
        el.userName.textContent = state.employeeName;
        const initials = state.employeeName.substring(0,2).toUpperCase();
        el.headerInitials.textContent = initials;

        initializeApp();
    }

    function onLoadFail(err) {
        if (handleSystemError(err)) return;
        state.employeeName = CONFIG.currentUser;
        el.userName.textContent = state.employeeName;
        initializeApp(); 
    }

    function initializeApp() {
        if (isApiReady()) {
            google.script.run
                .withSuccessHandler(result => {
                    let pages = ['DASHBOARD', 'USERPROFILE'];
                    if (result.success && result.pages) pages = result.pages;
                    
                    state.accessiblePages = pages;
                    updateUIVisibility(pages);
                    renderQuickActions(pages);
                    attachSidebarListeners();
                    loadHeaderProfilePicture();
                    
                    // Route to Initial Page
                    const urlParams = new URLSearchParams(window.location.search);
                    let page = urlParams.get('page') || 'Dashboard';
                    if (state.isRestricted || (!pages.includes(page.toUpperCase()) && page !== 'Dashboard' && page !== 'UserProfile')) {
                        page = 'Dashboard';
                    }
                    window.loadPage(page);

                    // เริ่มทำการแอบโหลดล่วงหน้า (Pre-loading) ทันทีที่โหลดหน้าแรกเสร็จ
                    startBackgroundPreloading(pages);

                    // Start Polling
                    checkForNewOrders(); 
                    state.currentInterval = setInterval(checkForNewOrders, CONFIG.pollInterval);

                })
                .withFailureHandler(err => {
                    if (handleSystemError(err)) return;
                    console.error(err);
                    updateUIVisibility(['DASHBOARD']);
                    window.loadPage('Dashboard');
                })
                .getAccessiblePages();
        } else {
            // โหมดทดสอบ Local
            window.loadPage('Dashboard');
        }
    }

    // --- Background Preloading Logic ---
    function startBackgroundPreloading(accessiblePages) {
        let uniquePages = [...new Set(accessiblePages.map(p => EXACT_PAGE_NAMES[p] || p))];
        pagesToPreload = uniquePages.filter(p => p !== 'Dashboard' && p !== 'Welcome');
        preloadNextFrame();
    }

    function preloadNextFrame() {
        if (pagesToPreload.length === 0) return; 
        const pageToLoad = pagesToPreload.shift();
        
        if (!preloadedFrames[pageToLoad]) {
            createIframeForPage(pageToLoad, true);
        } else {
            preloadNextFrame();
        }
    }

    function createIframeForPage(pageName, isBackgroundMode) {
        const iframe = document.createElement('iframe');
        iframe.id = `frame_${pageName}`;
        // นำ border-0 ออกมาอย่างเดียว ไม่มี rounded-xl และ shadow-sm แล้ว
        iframe.className = "w-full border-0 bg-white absolute inset-0 h-full iframe-layer";
        iframe.allow = "geolocation *; camera *;";
        iframe.dataset.loaded = "false";
        
        if (isBackgroundMode) {
            iframe.style.opacity = '0';
            iframe.style.pointerEvents = 'none';
            iframe.style.zIndex = '0';
        } else {
            iframe.style.opacity = '1';
            iframe.style.pointerEvents = 'auto';
            iframe.style.zIndex = '10';
        }
        
        iframe.onload = () => {
            iframe.dataset.loaded = "true";
            if (state.currentPage === pageName) hideLoading();
            
            // ถ้าแอบโหลดเป็นพื้นหลัง เมื่อโหลดเสร็จให้รีบโหลดหน้าถัดไปทันที (ปรับลดเวลาให้เร็วขึ้น)
            if (isBackgroundMode) {
                setTimeout(preloadNextFrame, 300);
            }
        };

        iframe.src = `${CONFIG.scriptUrl}?page=${pageName}`;
        el.iframeContainer.appendChild(iframe);
        preloadedFrames[pageName] = iframe;
        
        return iframe;
    }

    // --- UI Logic ---
    function setupDateDisplay() {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        el.currentDate.textContent = new Date().toLocaleDateString('en-US', options);
    }

    function showLoading() { 
        el.loading.classList.remove('hidden'); 
        setTimeout(() => el.loading.classList.remove('opacity-0'), 10);
    }
    
    function hideLoading() { 
        el.loading.classList.add('opacity-0');
        setTimeout(() => el.loading.classList.add('hidden'), 300); 
    }

    function updateUIVisibility(accessiblePages) {
        state.isRestricted = accessiblePages.length <= 2 && accessiblePages.includes('DASHBOARD');

        el.sidebarLinks.forEach(link => {
            const page = link.dataset.page?.toUpperCase();
            if(!page) return;
            
            let isVisible = false;
            if (state.isRestricted) {
                isVisible = (page === 'DASHBOARD' && link.dataset.pageType === 'Welcome');
            } else {
                isVisible = accessiblePages.includes(page);
                if (page === 'DASHBOARD' && link.dataset.pageType === 'Dashboard') {
                    isVisible = accessiblePages.includes('SALE') || accessiblePages.includes('REPORTS') || accessiblePages.includes('DASHBOARD_02');
                }
            }
            link.style.display = isVisible ? 'flex' : 'none';
        });

        document.querySelectorAll('.nav-group').forEach(group => {
            const visibleChildren = Array.from(group.querySelectorAll('.sidebar-link'))
                .filter(l => l.style.display !== 'none');
            group.style.display = visibleChildren.length > 0 ? 'block' : 'none';
        });

        if (state.isRestricted) {
            el.restrictedMsg.innerHTML = `<p class="font-bold">Restricted Access</p><p class="text-sm mt-1">Hello ${state.employeeName}, your account is pending activation. Please contact the administrator.</p>`;
            el.restrictedMsg.style.display = 'block';
            el.featureSection.style.display = 'none';
            el.greeting.parentElement.style.display = 'none';
        } else {
            el.restrictedMsg.style.display = 'none';
            el.featureSection.style.display = 'block';
            el.greeting.parentElement.style.display = 'block';
            el.greeting.innerHTML = `Signed in as <strong class="text-green-700">${state.employeeName}</strong>`;
        }
    }

    function renderQuickActions(pages) {
        el.quickActionsGrid.innerHTML = '';
        pages.forEach(page => {
            const config = QUICK_ACTIONS[page];
            if (config) {
                const card = document.createElement('div');
                card.className = `shortcut-card bg-white p-6 rounded-xl border border-gray-100 flex items-center cursor-pointer ${config.hover}`;
                
                let targetPage = EXACT_PAGE_NAMES[page] || page;
                card.onclick = () => window.loadPage(targetPage);

                card.innerHTML = `
                    <div class="w-14 h-14 rounded-full ${config.color} flex items-center justify-center text-xl shadow-sm mr-4 flex-shrink-0">
                        <i class="fas ${config.icon}"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-gray-800 text-lg">${config.title}</h3>
                        <p class="text-gray-500 text-xs mt-0.5">${config.desc}</p>
                    </div>
                    <div class="ml-auto text-gray-300">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                `;
                el.quickActionsGrid.appendChild(card);
            }
        });
    }

    // --- Navigation Logic ---
    window.loadPage = function(pageName) {
        if (!pageName) pageName = 'Dashboard';
        const targetPage = EXACT_PAGE_NAMES[pageName.toUpperCase()] || pageName;
        state.currentPage = targetPage;
        
        loadHeaderProfilePicture();

        // Active State in Sidebar
        el.sidebarLinks.forEach(link => link.classList.remove('active'));
        const activeLink = document.querySelector(`.sidebar-link[data-page="${pageName}"]`);
        let title = pageName;
        if(activeLink) {
            activeLink.classList.add('active');
            title = activeLink.querySelector('.sidebar-text').textContent;
            const group = activeLink.closest('.nav-group');
            if(group) {
                group.querySelector('.nav-group-items').classList.remove('hidden');
                const icon = group.querySelector('.fa-chevron-down');
                if(icon) icon.style.transform = 'rotate(180deg)';
            }
        }
        if(QUICK_ACTIONS[pageName.toUpperCase()]) title = QUICK_ACTIONS[pageName.toUpperCase()].title;
        el.pageTitle.textContent = title;

        // Logic Switcher
        if (targetPage === 'Dashboard') {
            el.welcomeContainer.style.display = 'flex';
            el.iframeContainer.style.display = 'none';
            el.pageTitle.textContent = 'Home';
            hideLoading();
        } else {
            // Check Access First
            if (state.isRestricted && targetPage !== 'UserProfile') {
                showAccessDenied('You do not have permission to access this page.');
                window.loadPage('Dashboard');
                return;
            }

            el.welcomeContainer.style.display = 'none';
            el.iframeContainer.style.display = 'block';

            // เอา iframes ทั้งหมดไปซ่อนไว้ข้างหลังก่อน
            Object.values(preloadedFrames).forEach(frame => {
                frame.style.opacity = '0';
                frame.style.pointerEvents = 'none';
                frame.style.zIndex = '0';
            });

            if (!preloadedFrames[targetPage]) {
                showLoading();
                createIframeForPage(targetPage, false);
                pagesToPreload = pagesToPreload.filter(p => p !== targetPage);
            } else {
                const activeFrame = preloadedFrames[targetPage];
                activeFrame.style.opacity = '1';
                activeFrame.style.pointerEvents = 'auto';
                activeFrame.style.zIndex = '10';

                // เช็คว่าโหลดเสร็จแล้วจริงๆ หรือกำลังโหลดอยู่
                if (activeFrame.dataset.loaded === "true") {
                    hideLoading();
                } else {
                    showLoading();
                }
            }
        }

        // Mobile Close Action
        if (window.innerWidth < 768) {
            document.body.classList.remove('mobile-sidebar-open');
        }
    };

    function attachSidebarListeners() {
        el.sidebarLinks.forEach(link => {
            link.onclick = (e) => {
                e.preventDefault();
                const page = link.dataset.page;
                const type = link.dataset.pageType;
                
                if (page === 'Dashboard' && type === 'Welcome') window.loadPage('Dashboard');
                else window.loadPage(page);
            };
        });
    }

    // --- Profile & Logout ---
    window.updateProfilePictureInHeader = function(url) {
        if(el.profilePic) el.profilePic.src = addCacheBuster(url);
    }

    function loadHeaderProfilePicture() {
        if (!isApiReady()) return;
        google.script.run
            .withSuccessHandler(res => {
                if(res.success && res.profilePicURL) updateProfilePictureInHeader(res.profilePicURL);
            })
            .withFailureHandler(err => handleSystemError(err))
            .getProfilePicForHeader();
    }

    function handleLogout() {
        showLoading();
        google.script.run
            .withSuccessHandler(res => {
                 if(res && res.success) window.top.location.href = res.redirectUrl;
                 else if(res && res.message) showAccessDenied(res.message);
                 else window.top.location.reload();
            })
            .withFailureHandler(err => {
                 // ถ้าเซิร์ฟเวอร์ปฏิเสธการเชื่อมต่อ ให้บังคับรีเฟรชหน้าต่างเพื่อเด้งไปหน้า Login ทันที
                 window.top.location.reload();
            })
            .doLogout();
    }

    // --- Notifications & Real-time ---
    function showToast(title, message, type = 'info') {
        const toast = document.createElement('div');
        
        let colors = {
            success: 'border-l-4 border-green-500 bg-white text-gray-800',
            error: 'border-l-4 border-red-500 bg-white text-gray-800',
            info: 'border-l-4 border-blue-500 bg-white text-gray-800'
        }[type];
        
        let icon = {
            success: 'fa-check-circle text-green-500',
            error: 'fa-exclamation-circle text-red-500',
            info: 'fa-info-circle text-blue-500'
        }[type];

        toast.className = `toast-item w-80 md:w-96 p-4 rounded-r shadow-lg flex items-start ${colors}`;
        toast.innerHTML = `
            <div class="flex-shrink-0 mt-0.5"><i class="fas ${icon} text-lg"></i></div>
            <div class="ml-3 flex-1">
                <h3 class="text-sm font-bold">${title}</h3>
                <p class="text-xs mt-1 text-gray-600 leading-relaxed">${message}</p>
            </div>
            <button class="ml-2 text-gray-400 hover:text-gray-600" onclick="this.parentElement.remove()">
                <i class="fas fa-times"></i>
            </button>
        `;
        el.toastContainer.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('show'));
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 400); 
        }, 5000);
    }

    function checkForNewOrders() {
        if (!isApiReady()) return;
        google.script.run
            .withSuccessHandler(data => {
                if (!data) return;
                if (state.lastKnownOrderId === null) { state.lastKnownOrderId = data.orderId; return; }
                if (data.orderId !== state.lastKnownOrderId) {
                    showToast('New Voucher Order!', `Order ID: ${data.orderId} has been received.`, 'success');
                    state.lastKnownOrderId = data.orderId;
                }
            })
            .withFailureHandler(err => handleSystemError(err))
            .getLatestOrderId();
    }

    window.forceRefreshFeed = function() {
        el.refreshIcon.classList.add('spin-slow');
        checkForNewOrders();
        
        if (state.currentPage !== 'Dashboard' && preloadedFrames[state.currentPage]) {
            showLoading();
            preloadedFrames[state.currentPage].dataset.loaded = "false";
            preloadedFrames[state.currentPage].contentWindow.location.reload();
        }

        setTimeout(() => {
            el.refreshIcon.classList.remove('spin-slow');
            showToast('Feed Refreshed', 'Latest data has been loaded.', 'info');
        }, 1000);
    };

    function isApiReady() { return typeof google !== 'undefined' && google.script && google.script.run; }
    function addCacheBuster(url) { return url.includes('?') ? `${url}&t=${Date.now()}` : `${url}?t=${Date.now()}`; }
    function showAccessDenied(msg) {
        el.accessMsg.textContent = msg;
        el.accessBox.style.display = 'block';
        setTimeout(hideAccessDenied, 5000);
    }
    function hideAccessDenied() { el.accessBox.style.display = 'none'; }

    // --- System Error & Session Expire Handler ---
    function handleSystemError(err) {
        if (!err) return false;
        const errorText = typeof err === 'string' ? err : (err.message || String(err));
        
        // ตรวจจับข้อความว่ามีคำเกี่ยวกับการที่ Session หมดอายุหรือไม่
        if (errorText.includes('Session หมดอายุ') || errorText.includes('ล็อกอิน') || errorText.includes('หมดอายุ')) {
            showToast('Session Expired', 'เซสชันหมดอายุ กำลังออกจากระบบอัตโนมัติ...', 'error');
            setTimeout(() => {
                handleLogout();
            }, 1000);
            return true; 
        }
        return false;
    }

</script>
</body>
</html>
